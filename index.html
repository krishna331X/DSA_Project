<!DOCTYPE html>
<html>
<head>
    <title>Simple DSA To-Do</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding-top: 50px; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 300px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; font-size: 18px; margin-bottom: 20px; }
        input { padding: 8px; width: 180px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px; cursor: pointer; border-radius: 4px; }
        .add-btn { background: #27ae60; color: white; border: none; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin-top: 5px; padding: 10px; display: flex; justify-content: space-between; border-radius: 4px; align-items: center; }
        .del-btn { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 5px 8px; }
    </style>
</head>
<body>

<h2>DSA Project: Linked List TO-DO-LIST</h2>

<div class="box">
    <input type="text" id="taskInput" placeholder="Write task...">
    <button class="add-btn" onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    class Node {
        constructor(id, text) {
            this.id = id;
            this.text = text;
            this.next = null;
        }
    }

    let head = null;
    let count = 0;

    function addTask() {
        let input = document.getElementById("taskInput");
        if (input.value === "") return;

        count++;
        let newNode = new Node(count, input.value);

        if (head === null) {
            head = newNode;
        } else {
            let temp = head;
            while (temp.next !== null) { temp = temp.next; }
            temp.next = newNode;
        }

        input.value = "";
        render();
    }

    function deleteTask(id) {
        if (head === null) return;
        if (head.id === id) {
            head = head.next;
        } else {
            let temp = head;
            while (temp.next !== null && temp.next.id !== id) {
                temp = temp.next;
            }
            if (temp.next !== null) {
                temp.next = temp.next.next;
            }
        }
        render();
    }

    function render() {
        let listHtml = document.getElementById("taskList");
        listHtml.innerHTML = "";
        let temp = head;
        while (temp !== null) {
            listHtml.innerHTML += `
                <li>
                    ${temp.text}
                    <button class="del-btn" onclick="deleteTask(${temp.id})">Delete</button>
                </li>`;
            temp = temp.next;
        }
    }
    document.getElementById("taskInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            addTask();
        }
    });

</script>

</body>
</html>
