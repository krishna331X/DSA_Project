<!DOCTYPE html>
<html>
<head>
    <title>Advanced DSA Task Manager</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --primary: #38bdf8; --accent: #ef4444; --success: #22c55e;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--primary); margin-bottom: 5px; }
        
        /* Progress Bar Styling */
        .progress-container { width: 100%; max-width: 400px; background: #334155; height: 10px; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--success); transition: width 0.5s ease; }
        
        .stats { font-size: 14px; margin-bottom: 10px; color: #94a3b8; }

        .container { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #334155; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; outline: none; }
        
        button { padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .add-btn { background: var(--primary); color: #0f172a; }
        .undo-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px; width: 100%; font-size: 13px; }
        
        ul { list-style: none; padding: 0; }
        li { 
            background: #334155; margin-bottom: 10px; padding: 12px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .completed { text-decoration: line-through; opacity: 0.5; }
        .actions button { padding: 5px 8px; margin-left: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
    <h2>Lync Task Manager</h2>
    <p style="font-size: 12px; color: #94a3b8; margin-top: -5px;">Linking productivity, one node at a time.</p>
    
    <div class="stats" id="stats">Total Tasks: 0 | Completed: 0</div>
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>
</div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new goal...">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
        
        <ul id="taskList"></ul>
        <button id="undoBtn" class="undo-btn" onclick="undoDelete()" disabled>↺ Undo Delete (Stack Pop)</button>
    </div>

<script>
    class Node {
        constructor(id, text) {
            this.id = id; this.text = text; this.completed = false; this.next = null;
        }
    }

    let head = null;
    let deleteStack = [];
    let count = 0;

    function addTask() {
        let input = document.getElementById("taskInput");
        if (!input.value.trim()) return;
        count++;
        let newNode = new Node(count, input.value);
        if (!head) head = newNode;
        else {
            let temp = head;
            while (temp.next) temp = temp.next;
            temp.next = newNode;
        }
        input.value = "";
        render();
    }

    function toggleComplete(id) {
        let temp = head;
        while (temp) {
            if (temp.id === id) temp.completed = !temp.completed;
            temp = temp.next;
        }
        render();
    }

    function deleteTask(id) {
        if (!head) return;
        let deleted = null;
        if (head.id === id) { deleted = head; head = head.next; }
        else {
            let temp = head;
            while (temp.next && temp.next.id !== id) temp = temp.next;
            if (temp.next) { deleted = temp.next; temp.next = temp.next.next; }
        }
        if (deleted) {
            deleteStack.push({ text: deleted.text, completed: deleted.completed });
            document.getElementById("undoBtn").disabled = false;
        }
        render();
    }

    function undoDelete() {
        if (deleteStack.length === 0) return;
        let last = deleteStack.pop();
        count++;
        let newNode = new Node(count, last.text);
        newNode.completed = last.completed;
        if (!head) head = newNode;
        else {
            let temp = head; while (temp.next) temp = temp.next; temp.next = newNode;
        }
        if (deleteStack.length === 0) document.getElementById("undoBtn").disabled = true;
        render();
    }

    function render() {
        let listHtml = document.getElementById("taskList");
        listHtml.innerHTML = "";
        let temp = head;
        let total = 0, done = 0;

        while (temp) {
            total++;
            if (temp.completed) done++;
            listHtml.innerHTML += `
                <li class="${temp.completed ? 'completed' : ''}">
                    <span>${temp.text}</span>
                    <div class="actions">
                        <button style="background:var(--success)" onclick="toggleComplete(${temp.id})">✓</button>
                        <button style="background:var(--accent)" onclick="deleteTask(${temp.id})">✕</button>
                    </div>
                </li>`;
            temp = temp.next;
        }

        // Update Stats & Progress Bar
        document.getElementById("stats").innerText = `Total Tasks: ${total} | Completed: ${done}`;
        let percent = total === 0 ? 0 : (done / total) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
    }

    document.getElementById("taskInput").addEventListener("keypress", (e) => { if(e.key === "Enter") addTask(); });
</script>
</body>
</html>
