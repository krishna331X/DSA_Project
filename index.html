<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Gloss | Luxury Nail Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fdf6f6; }
        .luxury-font { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>
<body class="text-gray-800">

    <header class="h-64 flex flex-col items-center justify-center bg-pink-100 border-b border-pink-200">
        <h1 class="luxury-font text-5xl text-pink-600">Glow & Gloss</h1>
        <p class="tracking-widest uppercase text-sm mt-2 text-pink-400">Exquisite Nail Artistry</p>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="glass p-6 rounded-2xl shadow-xl">
            <h2 class="luxury-font text-2xl mb-4 text-pink-700">Book Appointment</h2>
            <input id="custName" type="text" placeholder="Customer Name" class="w-full p-3 mb-3 rounded-lg border focus:ring-2 focus:ring-pink-300 outline-none">
            <select id="service" class="w-full p-3 mb-3 rounded-lg border outline-none">
                <option>Gel Extensions - ₹1200</option>
                <option>Chrome Art - ₹800</option>
                <option>Classic Manicure - ₹500</option>
            </select>
            <button onclick="bookAppt()" class="w-full bg-pink-500 text-white p-3 rounded-lg hover:bg-pink-600 transition">Confirm Booking</button>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl border-t-4 border-pink-400">
            <h2 class="luxury-font text-2xl mb-4">Walk-in Queue</h2>
            <div id="queueList" class="space-y-2 mb-4 h-32 overflow-y-auto">
                </div>
            <button onclick="addWalkIn()" class="w-full border-2 border-pink-400 text-pink-600 p-2 rounded-lg hover:bg-pink-50">Add Walk-in</button>
            <button onclick="serveQueue()" class="w-full mt-2 bg-gray-800 text-white p-2 rounded-lg">Serve Next</button>
        </div>

        <div class="glass p-6 rounded-2xl shadow-xl">
            <h2 class="luxury-font text-2xl mb-4">Admin Actions</h2>
            <div id="appointmentList" class="text-sm space-y-2 mb-4">
                </div>
            <button onclick="undoAction()" class="w-full bg-yellow-100 text-yellow-700 p-2 rounded-lg border border-yellow-300">↺ Undo Last Booking</button>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
