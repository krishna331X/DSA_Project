<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My DSA To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f0f0; }
        .container { margin-top: 50px; padding: 20px; background: white; display: inline-block; border-radius: 10px; shadow: 2px 2px 10px gray; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DSA To-Do List Project</h1>
        <p>This website uses <b>C++ Linked Lists</b> in the backend!</p>
        <p>Status: Under Development</p>
    </div>
</body>
</html>
<script>
    // Ye Linked List ka logic hai (JavaScript mein)
    class Node {
        constructor(task) {
            this.task = task;
            this.next = null;
        }
    }

    class LinkedList {
        constructor() { this.head = null; }
        
        add(taskName) {
            let newNode = new Node(taskName);
            if (!this.head) {
                this.head = newNode;
            } else {
                let temp = this.head;
                while (temp.next) { temp = temp.next; }
                temp.next = newNode;
            }
            this.display();
        }

        display() {
            const listElement = document.getElementById("task-list");
            listElement.innerHTML = ""; 
            let temp = this.head;
            while (temp) {
                listElement.innerHTML += `<li>${temp.task}</li>`;
                temp = temp.next;
            }
        }
    }

    const myTasks = new LinkedList();
    function addNewTask() {
        let val = document.getElementById("taskInput").value;
        if(val) myTasks.add(val);
    }
</script>

<input type="text" id="taskInput" placeholder="Enter task...">
<button onclick="addNewTask()">Add Task</button>
<ul id="task-list"></ul>
