<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My DSA To-Do List</title>
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    display: flex;
    justify-content: center;
    padding: 20px;
}
.app-container {
    background: white;
    width: 350px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
h1 { color: #333; text-align: center; font-size: 24px; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
input { 
    flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none;
}
button { 
    padding: 10px 15px; background-color: #27ae60; color: white; 
    border: none; border-radius: 5px; cursor: pointer; transition: 0.3s;
}
button:hover { background-color: #219150; }
ul { list-style: none; padding: 0; }
li { 
    background: #fff; border-bottom: 1px solid #eee; padding: 12px;
    display: flex; justify-content: space-between; align-items: center;
    transition: transform 0.2s;
}
li:hover { transform: scale(1.02); }
.del-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; }
.del-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DSA To-Do List Project</h1>
        <p>This website uses <b>C++ Linked Lists</b> in the backend!</p>
        <p>Status: Under Development</p>
    </div>
</body>
</html>
<script>
    // Ye Linked List ka logic hai (JavaScript mein)
    class Node {
        constructor(task) {
            this.task = task;
            this.next = null;
        }
    }

    class LinkedList {
        constructor() { this.head = null; }
        
        add(taskName) {
            let newNode = new Node(taskName);
            if (!this.head) {
                this.head = newNode;
            } else {
                let temp = this.head;
                while (temp.next) { temp = temp.next; }
                temp.next = newNode;
            }
            this.display();
        }

        display() {
            const listElement = document.getElementById("task-list");
            listElement.innerHTML = ""; 
            let temp = this.head;
            while (temp) {
                listElement.innerHTML += `<li>${temp.task}</li>`;
                temp = temp.next;
            }
        }
    }

    const myTasks = new LinkedList();
    function addNewTask() {
        let val = document.getElementById("taskInput").value;
        if(val) myTasks.add(val);
    }
</script>

<input type="text" id="taskInput" placeholder="Enter task...">
<button onclick="addNewTask()">Add Task</button>
<ul id="task-list"></ul>
