<!DOCTYPE html>
<html>
<head>
    <title>Simple DSA To-Do</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #f0f0f0; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 300px; margin-top: 50px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 8px; width: 180px; }
        button { padding: 8px; cursor: pointer; }
        li { background: #eee; margin-top: 5px; padding: 8px; display: flex; justify-content: space-between; border-radius: 4px; }
        .del-btn { background: red; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h3>My Tasks</h3>
    <input type="text" id="taskInput" placeholder="Write task...">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    // 1. Linked List structure
    class Node {
        constructor(id, text) {
            this.id = id;
            this.text = text;
            this.next = null;
        }
    }

    let head = null; // List ki shuruat
    let count = 0;   // Har task ke liye unique ID

    // 2. Insert at End
    function addTask() {
        let input = document.getElementById("taskInput");
        if (input.value === "") return; // Khali input handle karein

        count++;
        let newNode = new Node(count, input.value);

        if (head === null) {
            head = newNode;
        } else {
            let temp = head;
            while (temp.next !== null) { temp = temp.next; }
            temp.next = newNode;
        }

        input.value = ""; // Box khali karein
        render(); // Website update karein
    }

    // 3. To delete task
    function deleteTask(id) {
        if (head === null) return;

        // Agar pehla hi task delete karna ho
        if (head.id === id) {
            head = head.next;
        } else {
            let temp = head;
            while (temp.next !== null && temp.next.id !== id) {
                temp = temp.next;
            }
            if (temp.next !== null) {
                temp.next = temp.next.next; // Connection tod kar aage jodna
            }
        }
        render(); // Website update karein
    }

    // 4. To See in Screen
    function render() {
        let listHtml = document.getElementById("taskList");
        listHtml.innerHTML = ""; // Purani list clear karein

        let temp = head;
        while (temp !== null) {
            listHtml.innerHTML += `
                <li>
                    ${temp.text}
                    <button class="del-btn" onclick="deleteTask(${temp.id})">X</button>
                </li>`;
            temp = temp.next;
        }
    }
</script>

</body>
</html>
