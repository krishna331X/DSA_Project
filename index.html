<!DOCTYPE html>
<html>
<head>
    <title>Pro DSA To-Do List</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --accent: #ef4444;
            --success: #22c55e;
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 40px 20px;
        }
        h2 { color: var(--primary); font-weight: 700; letter-spacing: -1px; margin-bottom: 30px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { 
            flex: 1; background: #334155; border: 1px solid #475569; padding: 12px 16px; 
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        button { 
            padding: 12px 18px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: 600; transition: 0.2s; 
        }
        .add-btn { background: var(--primary); color: #0f172a; }
        .undo-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; width: 100%; }
        .undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { 
            background: #334155; margin-bottom: 12px; padding: 14px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .task-text { flex: 1; cursor: pointer; transition: 0.3s; }
        .completed { text-decoration: line-through; opacity: 0.5; color: #94a3b8; }
        .actions { display: flex; gap: 8px; }
        .del-btn { background: var(--accent); color: white; padding: 6px 10px; font-size: 12px; }
        .check-btn { background: var(--success); color: white; padding: 6px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>DSA Project: Linked List Pro</h2>

    <div class="container">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a master task...">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
        
        <ul id="taskList"></ul>

        <button id="undoBtn" class="undo-btn" onclick="undoDelete()" disabled>↺ Undo Last Delete (Stack)</button>
    </div>

<script>
    class Node {
        constructor(id, text) {
            this.id = id;
            this.text = text;
            this.completed = false;
            this.next = null;
        }
    }

    let head = null;
    let deleteStack = []; // Stack for Undo functionality
    let count = 0;

    function addTask() {
        let input = document.getElementById("taskInput");
        if (input.value.trim() === "") return;
        count++;
        let newNode = new Node(count, input.value);
        if (!head) head = newNode;
        else {
            let temp = head;
            while (temp.next) temp = temp.next;
            temp.next = newNode;
        }
        input.value = "";
        render();
    }

    function toggleComplete(id) {
        let temp = head;
        while (temp) {
            if (temp.id === id) temp.completed = !temp.completed;
            temp = temp.next;
        }
        render();
    }

    function deleteTask(id) {
        if (!head) return;
        let deletedNode = null;

        if (head.id === id) {
            deletedNode = head;
            head = head.next;
        } else {
            let temp = head;
            while (temp.next && temp.next.id !== id) temp = temp.next;
            if (temp.next) {
                deletedNode = temp.next;
                temp.next = temp.next.next;
            }
        }

        if (deletedNode) {
            deleteStack.push({ text: deletedNode.text, completed: deletedNode.completed });
            document.getElementById("undoBtn").disabled = false;
        }
        render();
    }

    function undoDelete() {
        if (deleteStack.length === 0) return;
        let lastTask = deleteStack.pop();
        count++;
        let newNode = new Node(count, lastTask.text);
        newNode.completed = lastTask.completed;
        
        // Push back to list (Stack to List)
        if (!head) head = newNode;
        else {
            let temp = head;
            while (temp.next) temp = temp.next;
            temp.next = newNode;
        }

        if (deleteStack.length === 0) document.getElementById("undoBtn").disabled = true;
        render();
    }

    function render() {
        let listHtml = document.getElementById("taskList");
        listHtml.innerHTML = "";
        let temp = head;
        while (temp) {
            listHtml.innerHTML += `
                <li>
                    <span class="task-text ${temp.completed ? 'completed' : ''}" onclick="toggleComplete(${temp.id})">
                        ${temp.text}
                    </span>
                    <div class="actions">
                        <button class="check-btn" onclick="toggleComplete(${temp.id})">✓</button>
                        <button class="del-btn" onclick="deleteTask(${temp.id})">✕</button>
                    </div>
                </li>`;
            temp = temp.next;
        }
    }

    document.getElementById("taskInput").addEventListener("keypress", (e) => { if(e.key === "Enter") addTask(); });
</script>
</body>
</html>
